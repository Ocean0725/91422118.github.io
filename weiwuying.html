        <h1>衛武營國家藝術文化中心</h1>
        <p><strong>地理位置：</strong> 高雄市鳳山區三多一路1號</p>
        <p><strong>建築特色：</strong> 由荷蘭建築師法蘭馨·侯班設計，靈感源自衛武營當地的老榕樹群。這座「無大門、無圍牆」的開放式建築擁有音響效果極佳的葡萄園式音樂廳。其巨大的白色波浪屋頂如同一片行雲流水般覆蓋著大地。</p>
        <p>「榕樹廣場」半戶外的開放空間完美呼應了南台灣炎熱的氣候，自然風的流動讓藝術與民眾的生活完全零距離。</p>
